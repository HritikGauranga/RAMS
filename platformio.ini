; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.htm

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
platform_packages =
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.2
	framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.2/esp32-arduino-libs-3.0.2.zip
lib_deps = 
	; Modbus libraries removed for RAMS firmware
	esp32async/ESPAsyncWebServer@^3.10.3
; Note: WebServer and LittleFS are built-in with espressif32 framework
; build_src_filter removed so default src files (e.g., main.cpp) are included

board_build.filesystem = littlefs

board_build.partitions = min_spiffs.csv
extra_scripts = pre:scripts/build_tag.py
